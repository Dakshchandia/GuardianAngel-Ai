services:
  - type: web
    name: guardianangel-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        value: ""
      - key: PYTHON_VERSION
        value: "3.11.0"
